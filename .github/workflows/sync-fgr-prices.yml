name: Sync FGR prices & mining news

on:
  schedule:
    # Weekdays ~08:30 Zimbabwe (FGR morning sheet)
    - cron: "30 6 * * 1-5"
    # Weekdays ~14:30 Zimbabwe (afternoon refresh)
    - cron: "30 12 * * 1-5"
    # Daily news pass ~18:00 Zimbabwe (incl. weekends)
    - cron: "0 16 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Sync latest FGR sheet mirror
        id: prices
        continue-on-error: true
        run: python tools/sync_fgr_prices.py --latest

      - name: Sync Zimbabwe mining news
        id: news
        continue-on-error: true
        run: python tools/sync_mining_news.py --limit 14

      - name: Commit updated JSON if changed
        if: steps.prices.outcome == 'success' || steps.news.outcome == 'success'
        run: |
          git config user.name "primerock-bot"
          git config user.email "primerock-bot@users.noreply.github.com"
          git add assets/data/gold_prices.json hosted-data/gold_prices.json \
                  assets/data/news.json hosted-data/news.json
          if git diff --staged --quiet; then
            echo "No content changes"
          else
            git commit -m "chore: sync FGR prices and mining news"
            git push
          fi
