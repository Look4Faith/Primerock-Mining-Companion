name: Sync FGR gold prices

on:
  schedule:
    # Weekdays 06:30 UTC (~08:30 Zimbabwe)
    - cron: "30 6 * * 1-5"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Sync latest FGR sheet mirror
        id: sync
        continue-on-error: true
        run: python tools/sync_fgr_prices.py --latest

      - name: Commit updated JSON if changed
        if: steps.sync.outcome == 'success'
        run: |
          git config user.name "primerock-bot"
          git config user.email "primerock-bot@users.noreply.github.com"
          git add assets/data/gold_prices.json hosted-data/gold_prices.json
          if git diff --staged --quiet; then
            echo "No price changes"
          else
            git commit -m "chore: sync FGR gold prices"
            git push
          fi
