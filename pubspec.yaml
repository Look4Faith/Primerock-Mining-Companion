name: primerock_mining_companion
description: Offline-first mining companion for Zimbabwean miners by Primerock Solutions.
publish_to: "none"
version: 1.2.0+3

environment:
  sdk: ^3.12.2

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  flutter_riverpod: ^2.6.1
  go_router: ^15.1.2
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  shared_preferences: ^2.5.3
  fl_chart: ^0.71.0
  intl: ^0.20.2
  url_launcher: ^6.3.1
  http: ^1.4.0
  connectivity_plus: ^6.1.4
  pdf: ^3.11.3
  printing: ^5.14.2
  path_provider: ^2.1.5
  uuid: ^4.5.1
  shimmer: ^3.0.0
  flutter_animate: ^4.5.2
  share_plus: ^11.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.3
  flutter_native_splash: ^2.4.6

flutter_launcher_icons:
  android: true
  ios: true
  image_path: assets/images/app_icon.png
  adaptive_icon_background: "#000000"
  adaptive_icon_foreground: assets/images/app_icon.png
  web:
    generate: true
    image_path: assets/images/app_icon.png
    background_color: "#000000"
    theme_color: "#D4AF37"
  windows:
    generate: true
    image_path: assets/images/app_icon.png

flutter_native_splash:
  color: "#000000"
  image: assets/images/splash_logo.png
  android_12:
    color: "#000000"
    image: assets/images/splash_logo.png
  ios: true
  web: true

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/data/
    - assets/articles/
  fonts:
    - family: Montserrat
      fonts:
        - asset: assets/fonts/Montserrat-Regular.ttf
          weight: 400
        - asset: assets/fonts/Montserrat-SemiBold.ttf
          weight: 600
        - asset: assets/fonts/Montserrat-Bold.ttf
          weight: 700

